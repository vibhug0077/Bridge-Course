<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Safe Networking Practices</text>
<rect x="55" y="140" width="330" height="170" rx="18" fill="white" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#247BA0">Trusted Network Profile</text>
<text x="220.0" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Enable discovery and sharing</text>
<text x="220.0" y="226" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">only on a trusted private LAN,</text>
<text x="220.0" y="247" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">not on public Wi-Fi.</text>
<rect x="437" y="140" width="330" height="170" rx="18" fill="white" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#4C956C">Least Privilege</text>
<text x="602.0" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Share only the required folder</text>
<text x="602.0" y="226" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">and grant only the permissions</text>
<text x="602.0" y="247" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">required for the lab.</text>
<rect x="819" y="140" width="330" height="170" rx="18" fill="white" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#F28F3B">Keep the Firewall</text>
<text x="984.0" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Do not disable the firewall</text>
<text x="984.0" y="226" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">globally. Permit only the exact</text>
<text x="984.0" y="247" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">application, port, and network</text>
<text x="984.0" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">profile needed.</text>
<rect x="55" y="365" width="330" height="170" rx="18" fill="white" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#6C5B7B">Use Encryption</text>
<text x="220.0" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Prefer HTTPS, SSH, SFTP, or a</text>
<text x="220.0" y="451" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">trusted VPN when data crosses</text>
<text x="220.0" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">untrusted networks.</text>
<rect x="437" y="365" width="330" height="170" rx="18" fill="white" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#D1495B">Remove Temporary Services</text>
<text x="602.0" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Stop test servers, remove</text>
<text x="602.0" y="451" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">temporary shares, and close</text>
<text x="602.0" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">firewall exceptions after use.</text>
<rect x="819" y="365" width="330" height="170" rx="18" fill="white" stroke="#118A8A" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#118A8A">Verify Before Trusting</text>
<text x="984.0" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Confirm device names, IP</text>
<text x="984.0" y="451" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">addresses, certificate</text>
<text x="984.0" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">warnings, and unexpected login</text>
<text x="984.0" y="493" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">prompts.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>