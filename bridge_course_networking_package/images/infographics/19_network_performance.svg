<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Network Performance: Similar Words, Different Meanings</text>
<rect x="55" y="140" width="330" height="170" rx="18" fill="white" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#247BA0">Bandwidth</text>
<text x="220.0" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Maximum theoretical</text>
<text x="220.0" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">data-carrying capacity of a</text>
<text x="220.0" y="248" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">link. Often expressed in Mbps</text>
<text x="220.0" y="269" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">or Gbps.</text>
<rect x="437" y="140" width="330" height="170" rx="18" fill="white" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#4C956C">Throughput</text>
<text x="602.0" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Actual useful data delivered</text>
<text x="602.0" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">per second after overhead,</text>
<text x="602.0" y="248" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">congestion, signal quality, and</text>
<text x="602.0" y="269" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">other limits.</text>
<rect x="819" y="140" width="330" height="170" rx="18" fill="white" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#F28F3B">Latency</text>
<text x="984.0" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Time taken for data to travel</text>
<text x="984.0" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">and a response to return. Often</text>
<text x="984.0" y="248" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">measured in milliseconds.</text>
<rect x="55" y="365" width="330" height="170" rx="18" fill="white" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#6C5B7B">Jitter</text>
<text x="220.0" y="431" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Variation in packet delay. High</text>
<text x="220.0" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">jitter can disturb real-time</text>
<text x="220.0" y="473" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">audio and video.</text>
<rect x="437" y="365" width="330" height="170" rx="18" fill="white" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#D1495B">Packet Loss</text>
<text x="602.0" y="431" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Packets that fail to reach the</text>
<text x="602.0" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">destination. Retransmission or</text>
<text x="602.0" y="473" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">visible quality loss may</text>
<text x="602.0" y="494" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">result.</text>
<rect x="819" y="365" width="330" height="170" rx="18" fill="white" stroke="#118A8A" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#118A8A">Reliability</text>
<text x="984.0" y="431" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">How consistently the network</text>
<text x="984.0" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">remains available and delivers</text>
<text x="984.0" y="473" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">data correctly.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>