<text x="600" y="610" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#5B677A">Port numbers are conventions, not guarantees. A service can be configured on another port, and firewalls may block it.</text>
