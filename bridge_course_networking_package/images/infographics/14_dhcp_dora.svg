<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">DHCP: How a Device Receives Network Settings Automatically</text>
<rect x="45" y="195" width="250" height="270" rx="18" fill="white" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="170.0" y="229" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#247BA0">1. Discover</text>
<text x="170.0" y="261" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Client broadcasts: Is a</text>
<text x="170.0" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">DHCP server available?</text>
<line x1="295" y1="330" x2="335" y2="330" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="335" y="195" width="250" height="270" rx="18" fill="white" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="460.0" y="229" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#4C956C">2. Offer</text>
<text x="460.0" y="261" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Server offers an</text>
<text x="460.0" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">address and</text>
<text x="460.0" y="307" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">configuration.</text>
<line x1="585" y1="330" x2="625" y2="330" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="625" y="195" width="250" height="270" rx="18" fill="white" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="750.0" y="229" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#F28F3B">3. Request</text>
<text x="750.0" y="261" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Client requests the</text>
<text x="750.0" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">offered address.</text>
<line x1="875" y1="330" x2="915" y2="330" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="915" y="195" width="250" height="270" rx="18" fill="white" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1040.0" y="229" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#6C5B7B">4. Acknowledge</text>
<text x="1040.0" y="261" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Server confirms the</text>
<text x="1040.0" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">lease.</text>
<rect x="355" y="500" width="490" height="90" rx="18" fill="#DFF2E5" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="534" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">Result</text>
<text x="600.0" y="564" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">IP address + subnet mask + default gateway +</text>
<text x="600.0" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">DNS server information</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>