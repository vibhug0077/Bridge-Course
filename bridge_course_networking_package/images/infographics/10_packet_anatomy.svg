<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">A Simplified View of a Network Packet</text>
<rect x="70" y="240" width="180" height="150" fill="#247BA0" stroke="white" stroke-width="3"/>
<text x="160.0" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Source Address</text>
<rect x="250" y="240" width="210" height="150" fill="#4C956C" stroke="white" stroke-width="3"/>
<text x="355.0" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Destination</text>
<text x="355.0" y="324" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Address</text>
<rect x="460" y="240" width="190" height="150" fill="#F28F3B" stroke="white" stroke-width="3"/>
<text x="555.0" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Protocol /</text>
<text x="555.0" y="324" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Ports</text>
<rect x="650" y="240" width="190" height="150" fill="#6C5B7B" stroke="white" stroke-width="3"/>
<text x="745.0" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Sequence /</text>
<text x="745.0" y="324" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Control</text>
<rect x="840" y="240" width="320" height="150" fill="#D1495B" stroke="white" stroke-width="3"/>
<text x="1000.0" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">Payload</text>
<text x="600" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1C2733">Real headers differ by protocol. The central idea is that control information surrounds a piece of user data.</text>
<rect x="80" y="455" width="250" height="105" rx="18" fill="#DCEFFC" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="205.0" y="489" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">Addressing</text>
<text x="205.0" y="519" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">Where the packet came</text>
<text x="205.0" y="539" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">from and where it</text>
<text x="205.0" y="559" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">should go</text>
<rect x="475" y="455" width="250" height="105" rx="18" fill="#FCE9D8" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="489" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">Control</text>
<text x="600.0" y="519" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">How endpoints</text>
<text x="600.0" y="539" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">interpret, order, and</text>
<text x="600.0" y="559" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">validate the data</text>
<rect x="870" y="455" width="250" height="105" rx="18" fill="#F8DEE2" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="995.0" y="489" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">Payload</text>
<text x="995.0" y="519" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">The actual part of the</text>
<text x="995.0" y="539" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">message being</text>
<text x="995.0" y="559" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">transported</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>