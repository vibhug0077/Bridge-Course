<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Understanding an IPv4 Address and Subnet Mask</text>
<text x="600" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#12355B">Example host: 192.168.10.25/24</text>
<rect x="260" y="215" width="150" height="90" rx="14" fill="#247BA0"/>
<text x="335" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="white">192</text>
<rect x="425" y="215" width="150" height="90" rx="14" fill="#247BA0"/>
<text x="500" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="white">168</text>
<rect x="590" y="215" width="150" height="90" rx="14" fill="#247BA0"/>
<text x="665" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="white">10</text>
<rect x="755" y="215" width="150" height="90" rx="14" fill="#F28F3B"/>
<text x="830" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="white">25</text>
<text x="475" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#247BA0">Network portion</text>
<line x1="260" y1="320" x2="740" y2="320" stroke="#247BA0" stroke-width="5"/>
<text x="830" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#F28F3B">Host portion</text>
<line x1="755" y1="320" x2="905" y2="320" stroke="#F28F3B" stroke-width="5"/>
<rect x="80" y="405" width="300" height="145" rx="18" fill="#DCEFFC" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="230.0" y="439" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1C2733">/24 Prefix</text>
<text x="230.0" y="471" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">The first 24 bits identify</text>
<text x="230.0" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">the network. Equivalent</text>
<text x="230.0" y="513" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">subnet mask: 255.255.255.0</text>
<rect x="450" y="405" width="300" height="145" rx="18" fill="#DFF2E5" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="439" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1C2733">Network Address</text>
<text x="600.0" y="471" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">192.168.10.0 identifies the</text>
<text x="600.0" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">subnet itself.</text>
<rect x="820" y="405" width="300" height="145" rx="18" fill="#FCE9D8" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="970.0" y="439" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1C2733">Host Range</text>
<text x="970.0" y="471" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Typically 192.168.10.1 to</text>
<text x="970.0" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">192.168.10.254; broadcast is</text>
<text x="970.0" y="513" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">192.168.10.255.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>