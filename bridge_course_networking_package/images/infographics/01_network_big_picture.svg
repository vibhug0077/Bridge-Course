<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">A Computer Network: The Big Picture</text>
<rect x="60" y="210" width="220" height="150" rx="18" fill="#DCEFFC" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="170.0" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Laptop</text>
<text x="170.0" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Creates and receives</text>
<text x="170.0" y="301" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">data</text>
<rect x="60" y="420" width="220" height="150" rx="18" fill="#DFF2E5" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="170.0" y="454" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Smartphone</text>
<text x="170.0" y="488" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Uses Wi-Fi to join</text>
<text x="170.0" y="511" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">the LAN</text>
<rect x="460" y="285" width="280" height="190" rx="18" fill="#FCE9D8" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="319" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Home Router</text>
<text x="600.0" y="353" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Switch + Wi-Fi access</text>
<text x="600.0" y="376" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">point + gateway</text>
<text x="600.0" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Connects the local network</text>
<text x="600.0" y="422" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">to the ISP</text>
<rect x="920" y="210" width="220" height="150" rx="18" fill="#EAE3F1" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1030.0" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Web Server</text>
<text x="1030.0" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Provides websites</text>
<text x="1030.0" y="301" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">and online services</text>
<rect x="920" y="420" width="220" height="150" rx="18" fill="#F8DEE2" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1030.0" y="454" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Cloud Service</text>
<text x="1030.0" y="488" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Stores data or runs</text>
<text x="1030.0" y="511" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">applications</text>
<line x1="280" y1="285" x2="460" y2="350" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="370.0" y="307.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5B677A">Wi-Fi/Ethernet</text>
<line x1="280" y1="495" x2="460" y2="410" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="370.0" y="442.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5B677A">Wi-Fi</text>
<line x1="740" y1="350" x2="920" y2="285" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="830.0" y="307.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5B677A">Internet</text>
<line x1="740" y1="410" x2="920" y2="495" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="830.0" y="442.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5B677A">Internet</text>
<text x="600" y="135" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#1C2733">A network allows devices to exchange data and share resources by following agreed communication rules.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>