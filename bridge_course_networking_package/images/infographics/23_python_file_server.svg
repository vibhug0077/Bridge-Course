<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Lab: Share a Read-Only Folder with a Temporary Web Server</text>
<rect x="65" y="150" width="330" height="355" rx="18" fill="#DCEFFC" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="230.0" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Computer A — Server</text>
<text x="230.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">1. Create a folder containing</text>
<text x="230.0" y="239" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">only lab files.</text>
<text x="230.0" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A"></text>
<text x="230.0" y="281" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">2. Open Terminal in that</text>
<text x="230.0" y="302" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">folder.</text>
<text x="230.0" y="323" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A"></text>
<text x="230.0" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">3. Run:</text>
<text x="230.0" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">python -m http.server 8000</text>
<rect x="805" y="150" width="330" height="355" rx="18" fill="#DFF2E5" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="970.0" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Computer B — Client</text>
<text x="970.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">1. Open a browser.</text>
<text x="970.0" y="239" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A"></text>
<text x="970.0" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">2. Visit:</text>
<text x="970.0" y="281" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">http://192.168.1.23:8000</text>
<text x="970.0" y="302" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A"></text>
<text x="970.0" y="323" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">3. Open or download a test</text>
<text x="970.0" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">file.</text>
<text x="970.0" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A"></text>
<rect x="465" y="240" width="270" height="170" rx="18" fill="#FCE9D8" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="274" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Wi-Fi Router</text>
<text x="600.0" y="308" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Carries local packets</text>
<text x="600.0" y="329" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">between the two</text>
<text x="600.0" y="350" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">computers. Internet</text>
<text x="600.0" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">access is not required</text>
<text x="600.0" y="392" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">for this LAN test.</text>
<line x1="395" y1="330" x2="465" y2="330" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="735" y1="330" x2="805" y2="330" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="600" y="565" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#D1495B">Stop the server with Ctrl+C. The directory listing is visible to other reachable devices while the server runs.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>