<text x="600.0" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#247BA0">10.0.0.0/8</text>
<text x="600.0" y="221" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">10.0.0.0 – 10.255.255.255</text>
<text x="600.0" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Large private networks</text>
<rect x="100" y="295" width="1000" height="115" rx="18" fill="#FFFFFF" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="329" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#4C956C">172.16.0.0/12</text>
<text x="600.0" y="366" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">172.16.0.0 – 172.31.255.255</text>
<text x="600.0" y="389" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Medium and enterprise networks</text>
<rect x="100" y="440" width="1000" height="115" rx="18" fill="#FFFFFF" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="474" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#F28F3B">192.168.0.0/16</text>
<text x="600.0" y="511" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">192.168.0.0 – 192.168.255.255</text>
<text x="600.0" y="534" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Very common in homes and small offices</text>
<text x="600" y="590" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#1C2733">Private addresses are used inside local networks and are normally translated by a router before reaching the public Internet.</text>
