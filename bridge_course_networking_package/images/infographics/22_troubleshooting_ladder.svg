<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">A Layered Troubleshooting Sequence</text>
<rect x="110" y="120" width="980" height="76" rx="12" fill="white" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#247BA0">1. Local Stack</text>
<text x="600.0" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">ping 127.0.0.1  —  Is TCP/IP operating locally?</text>
<line x1="600" y1="196" x2="600" y2="214" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="110" y="215" width="980" height="76" rx="12" fill="white" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="249" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#4C956C">2. Own Address</text>
<text x="600.0" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">ping your_IP  —  Can the interface answer locally?</text>
<line x1="600" y1="291" x2="600" y2="309" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="110" y="310" width="980" height="76" rx="12" fill="white" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#F28F3B">3. Default Gateway</text>
<text x="600.0" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">ping gateway_IP  —  Can you reach the local router?</text>
<line x1="600" y1="386" x2="600" y2="404" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="110" y="405" width="980" height="76" rx="12" fill="white" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="439" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#6C5B7B">4. Public IP</text>
<text x="600.0" y="469" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">ping 1.1.1.1  —  Can traffic reach the Internet without DNS?</text>
<line x1="600" y1="481" x2="600" y2="499" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="110" y="500" width="980" height="76" rx="12" fill="white" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="600.0" y="534" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#D1495B">5. Domain Name</text>
<text x="600.0" y="564" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">ping example.com  —  Does name resolution also work?</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>