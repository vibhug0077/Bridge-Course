<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">DNS Resolution: Turning a Name into an IP Address</text>
<rect x="55" y="250" width="210" height="130" rx="18" fill="#DCEFFC" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="160.0" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Browser</text>
<text x="160.0" y="318" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Requests</text>
<text x="160.0" y="341" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">www.example.com</text>
<rect x="350" y="150" width="250" height="130" rx="18" fill="#DFF2E5" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="475.0" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1C2733">Recursive Resolver</text>
<text x="475.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Checks cache and</text>
<text x="475.0" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">performs the lookup</text>
<rect x="680" y="120" width="190" height="110" rx="18" fill="#FCE9D8" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="775.0" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">Root</text>
<text x="775.0" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">Points toward the</text>
<text x="775.0" y="204" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">correct top-level</text>
<text x="775.0" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">domain</text>
<rect x="930" y="230" width="210" height="130" rx="18" fill="#EAE3F1" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1035.0" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">.com Server</text>
<text x="1035.0" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">Points toward the</text>
<text x="1035.0" y="314" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">domain authoritative</text>
<text x="1035.0" y="334" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">server</text>
<rect x="680" y="400" width="230" height="130" rx="18" fill="#F8DEE2" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="795.0" y="434" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">Authoritative DNS</text>
<text x="795.0" y="464" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">Returns the record</text>
<text x="795.0" y="484" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">for the requested</text>
<text x="795.0" y="504" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5B677A">name</text>
<line x1="265" y1="285" x2="350" y2="225" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="307.5" y="245.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5B677A">Query</text>
<line x1="600" y1="205" x2="680" y2="175" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="870" y1="175" x2="930" y2="265" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1035" y1="360" x2="795" y2="400" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="680" y1="465" x2="600" y2="260" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="640.0" y="352.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5B677A">IP answer</text>
<line x1="350" y1="270" x2="265" y2="330" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<text x="307.5" y="290.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5B677A">Return IP</text>
<text x="600" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1C2733">Caching makes repeated lookups faster. DNS failure can prevent a site from opening even when the physical connection is working.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>