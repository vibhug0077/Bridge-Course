<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">What Happens When You Open a Website?</text>
<rect x="55" y="135" width="330" height="180" rx="18" fill="white" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="169" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#247BA0">1. Interpret URL</text>
<text x="220.0" y="201" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">Browser identifies scheme,</text>
<text x="220.0" y="223" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">host, port, and path.</text>
<line x1="385" y1="225" x2="437" y2="225" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="437" y="135" width="330" height="180" rx="18" fill="white" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="169" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#4C956C">2. Resolve DNS</text>
<text x="602.0" y="201" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">Domain name is translated into</text>
<text x="602.0" y="223" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">an IP address.</text>
<line x1="767" y1="225" x2="819" y2="225" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="819" y="135" width="330" height="180" rx="18" fill="white" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="169" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#F28F3B">3. Create Connection</text>
<text x="984.0" y="201" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">TCP connection is created;</text>
<text x="984.0" y="223" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">HTTPS also negotiates TLS.</text>
<line x1="984" y1="315" x2="984" y2="370" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="55" y="370" width="330" height="180" rx="18" fill="white" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#6C5B7B">4. Send Request</text>
<text x="220.0" y="436" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">Browser sends an HTTP request</text>
<text x="220.0" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">for a resource.</text>
<line x1="385" y1="460" x2="437" y2="460" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="437" y="370" width="330" height="180" rx="18" fill="white" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#D1495B">5. Receive Response</text>
<text x="602.0" y="436" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">Server returns status, headers,</text>
<text x="602.0" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">and content.</text>
<line x1="767" y1="460" x2="819" y2="460" stroke="#5B677A" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="819" y="370" width="330" height="180" rx="18" fill="white" stroke="#118A8A" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#118A8A">6. Render Page</text>
<text x="984.0" y="436" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">Browser processes HTML, CSS,</text>
<text x="984.0" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">JavaScript, and additional</text>
<text x="984.0" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5B677A">resources.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>