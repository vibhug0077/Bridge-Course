<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Network Devices and Their Jobs</text>
<rect x="55" y="145" width="330" height="175" rx="18" fill="white" stroke="#247BA0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="179" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#247BA0">NIC</text>
<text x="220.0" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Connects one device to a</text>
<text x="220.0" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">network and provides a</text>
<text x="220.0" y="259" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">link-layer identity.</text>
<rect x="437" y="145" width="330" height="175" rx="18" fill="white" stroke="#4C956C" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="179" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#4C956C">Switch</text>
<text x="602.0" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Forwards Ethernet frames inside</text>
<text x="602.0" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">a LAN using MAC addresses.</text>
<rect x="819" y="145" width="330" height="175" rx="18" fill="white" stroke="#F28F3B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="179" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#F28F3B">Access Point</text>
<text x="984.0" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Allows Wi-Fi devices to join a</text>
<text x="984.0" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">wired local network.</text>
<rect x="55" y="375" width="330" height="175" rx="18" fill="white" stroke="#6C5B7B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="220.0" y="409" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#6C5B7B">Router</text>
<text x="220.0" y="443" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Moves IP packets between</text>
<text x="220.0" y="466" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">different networks and chooses</text>
<text x="220.0" y="489" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">a next hop.</text>
<rect x="437" y="375" width="330" height="175" rx="18" fill="white" stroke="#D1495B" stroke-width="1.5" filter="url(#shadow)"/>
<text x="602.0" y="409" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#D1495B">Modem / ONT</text>
<text x="602.0" y="443" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Connects the customer network</text>
<text x="602.0" y="466" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">to an ISP technology such as</text>
<text x="602.0" y="489" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">cable, DSL, or fibre.</text>
<rect x="819" y="375" width="330" height="175" rx="18" fill="white" stroke="#118A8A" stroke-width="1.5" filter="url(#shadow)"/>
<text x="984.0" y="409" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#118A8A">Firewall</text>
<text x="984.0" y="443" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">Allows or blocks traffic</text>
<text x="984.0" y="466" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5B677A">according to security rules.</text>
<text x="600" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals • Networking and Internet</text>
</svg>