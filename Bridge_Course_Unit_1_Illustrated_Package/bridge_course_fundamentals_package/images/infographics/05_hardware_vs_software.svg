<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Hardware and Software Work Together</title>
<desc id="desc">Educational infographic: Hardware and Software Work Together</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Hardware and Software Work Together</text>
<rect x="75" y="150" width="470" height="420" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="310" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="white">HARDWARE</text>
<text x="135" y="275" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• Physical components</text>
<text x="135" y="337" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• CPU and memory</text>
<text x="135" y="399" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• Keyboard and monitor</text>
<text x="135" y="461" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• Storage and network card</text>
<rect x="655" y="150" width="470" height="420" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="890" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="white">SOFTWARE</text>
<text x="715" y="275" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• Programs and instructions</text>
<text x="715" y="337" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• Operating system</text>
<text x="715" y="399" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• Applications</text>
<text x="715" y="461" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="white">• Utilities and drivers</text>
<line x1="545" y1="360" x2="650" y2="360" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="650" y1="410" x2="545" y2="410" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<text x="600" y="615" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1F2937">Hardware provides capability • Software directs the capability</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>