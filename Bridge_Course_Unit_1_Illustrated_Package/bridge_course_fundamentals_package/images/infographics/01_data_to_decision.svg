<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">From Data to Decision</title>
<desc id="desc">Educational infographic: From Data to Decision</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">From Data to Decision</text>
<text x="1152" y="53" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#DCE9F5">How raw facts become useful action</text>
<rect x="45" y="220" width="250" height="210" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="170" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="white">DATA</text>
<text x="170" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">
<tspan x="170" dy="0">Raw values</tspan>
<tspan x="170" dy="26">81, Meera, CSE101</tspan>
</text>
<line x1="295" y1="325" x2="330" y2="325" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="335" y="220" width="250" height="210" rx="18" fill="#118A8A" filter="url(#shadow)"/>
<text x="460" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="white">INFORMATION</text>
<text x="460" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">
<tspan x="460" dy="0">81% • Grade A</tspan>
<tspan x="460" dy="26">Result: Pass</tspan>
</text>
<line x1="585" y1="325" x2="620" y2="325" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="625" y="220" width="250" height="210" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="750" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="white">KNOWLEDGE</text>
<text x="750" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">
<tspan x="750" dy="0">Strong understanding</tspan>
<tspan x="750" dy="26">of the topic</tspan>
</text>
<line x1="875" y1="325" x2="910" y2="325" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="915" y="220" width="250" height="210" rx="18" fill="#4C956C" filter="url(#shadow)"/>
<text x="1040" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="white">DECISION</text>
<text x="1040" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">
<tspan x="1040" dy="0">Provide advanced</tspan>
<tspan x="1040" dy="26">learning activity</tspan>
</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>