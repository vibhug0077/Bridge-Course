<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Limitations and Risks of Computers</title>
<desc id="desc">Educational infographic: Limitations and Risks of Computers</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Limitations and Risks of Computers</text>
<rect x="70" y="150" width="300" height="180" rx="18" fill="#C44536" filter="url(#shadow)"/>
<text x="220" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="white">No common sense</text>
<text x="220" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="white">Follows formal rules</text>
<rect x="450" y="150" width="300" height="180" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="600" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="white">Depends on instructions</text>
<text x="600" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="white">Programs must be correct</text>
<rect x="830" y="150" width="300" height="180" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="980" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="white">Data quality matters</text>
<text x="980" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="white">Poor input gives poor output</text>
<rect x="70" y="380" width="300" height="180" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="220" y="438" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="white">No human emotions</text>
<text x="220" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="white">Cannot replace empathy</text>
<rect x="450" y="380" width="300" height="180" rx="18" fill="#118A8A" filter="url(#shadow)"/>
<text x="600" y="438" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="white">Security risks</text>
<text x="600" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="white">Malware and unauthorised access</text>
<rect x="830" y="380" width="300" height="180" rx="18" fill="#12355B" filter="url(#shadow)"/>
<text x="980" y="438" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="white">Infrastructure dependence</text>
<text x="980" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="white">Power, hardware and networks</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>