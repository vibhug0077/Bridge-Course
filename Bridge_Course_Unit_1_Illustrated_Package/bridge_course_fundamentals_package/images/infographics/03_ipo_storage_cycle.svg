<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Input–Processing–Output–Storage Cycle</title>
<desc id="desc">Educational infographic: Input–Processing–Output–Storage Cycle</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Input–Processing–Output–Storage Cycle</text>
<rect x="55" y="220" width="230" height="190" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="170" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">INPUT</text>
<text x="170" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="170" dy="0">Keyboard • Mouse</tspan>
<tspan x="170" dy="23">Sensor • Scanner</tspan>
</text>
<rect x="345" y="220" width="230" height="190" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="460" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">PROCESSING</text>
<text x="460" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="460" dy="0">CPU follows</tspan>
<tspan x="460" dy="23">instructions</tspan>
</text>
<rect x="635" y="220" width="230" height="190" rx="18" fill="#4C956C" filter="url(#shadow)"/>
<text x="750" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">OUTPUT</text>
<text x="750" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="750" dy="0">Monitor • Printer</tspan>
<tspan x="750" dy="23">Speaker</tspan>
</text>
<rect x="925" y="220" width="230" height="190" rx="18" fill="#118A8A" filter="url(#shadow)"/>
<text x="1040" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">FEEDBACK</text>
<text x="1040" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="1040" dy="0">Output can become</tspan>
<tspan x="1040" dy="23">new input</tspan>
</text>
<line x1="285" y1="315" x2="335" y2="315" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="575" y1="315" x2="625" y2="315" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="865" y1="315" x2="915" y2="315" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="410" y="470" width="380" height="105" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="600" y="515" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">STORAGE</text>
<text x="600" y="550" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="white">Saves programs, data and results</text>
<line x1="600" y1="410" x2="600" y2="465" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="555" y1="465" x2="555" y2="415" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>