<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">ATM Transaction Flow</title>
<desc id="desc">Educational infographic: ATM Transaction Flow</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">ATM Transaction Flow</text>
<rect x="45" y="160" width="235" height="115" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="162" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Insert card</text>
<line x1="280" y1="218" x2="325" y2="218" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="335" y="160" width="235" height="115" rx="18" fill="#118A8A" filter="url(#shadow)"/>
<text x="452" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Enter PIN</text>
<line x1="570" y1="218" x2="615" y2="218" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="625" y="160" width="235" height="115" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="742" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Validate PIN</text>
<line x1="860" y1="218" x2="905" y2="218" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="915" y="160" width="235" height="115" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="1032" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Select withdrawal</text>
<rect x="45" y="410" width="235" height="115" rx="18" fill="#4C956C" filter="url(#shadow)"/>
<text x="162" y="477" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Check balance</text>
<line x1="280" y1="468" x2="325" y2="468" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="335" y="410" width="235" height="115" rx="18" fill="#D66BA0" filter="url(#shadow)"/>
<text x="452" y="477" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Dispense cash</text>
<line x1="570" y1="468" x2="615" y2="468" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="625" y="410" width="235" height="115" rx="18" fill="#C44536" filter="url(#shadow)"/>
<text x="742" y="477" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Update account</text>
<line x1="860" y1="468" x2="905" y2="468" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="915" y="410" width="235" height="115" rx="18" fill="#12355B" filter="url(#shadow)"/>
<text x="1032" y="477" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="white">Show receipt</text>
<line x1="1110" y1="275" x2="1110" y2="360" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="1110" y1="360" x2="45" y2="468" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<text x="600" y="610" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#12355B">Decision checks: Is the PIN valid? Is sufficient balance available?</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>