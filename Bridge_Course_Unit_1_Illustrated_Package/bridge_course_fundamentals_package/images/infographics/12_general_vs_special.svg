<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">General-Purpose vs Special-Purpose Computers</title>
<desc id="desc">Educational infographic: General-Purpose vs Special-Purpose Computers</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">General-Purpose vs Special-Purpose Computers</text>
<rect x="80" y="160" width="490" height="390" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="325" y="215" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="white">GENERAL-PURPOSE</text>
<text x="140" y="290" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Runs many applications</text>
<text x="140" y="348" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Can be reprogrammed</text>
<text x="140" y="406" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Examples: laptop, desktop, phone</text>
<text x="140" y="464" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Changes tasks through software</text>
<rect x="630" y="160" width="490" height="390" rx="18" fill="#C44536" filter="url(#shadow)"/>
<text x="875" y="215" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="white">SPECIAL-PURPOSE</text>
<text x="690" y="290" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Designed for a limited function</text>
<text x="690" y="348" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Often embedded in a device</text>
<text x="690" y="406" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Examples: traffic controller, ECU</text>
<text x="690" y="464" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="white">• Optimised for its specific task</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>