<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Inside the Central Processing Unit</title>
<desc id="desc">Educational infographic: Inside the Central Processing Unit</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Inside the Central Processing Unit</text>
<rect x="130" y="145" width="940" height="445" rx="18" fill="#FFFFFF" stroke="#D5DCE5" stroke-width="2" filter="url(#shadow)"/>
<rect x="185" y="230" width="250" height="210" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="310" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">CONTROL UNIT</text>
<text x="310" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="white">
<tspan x="310" dy="0">Fetches and decodes</tspan>
<tspan x="310" dy="24">instructions</tspan>
</text>
<rect x="475" y="230" width="250" height="210" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="600" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">ALU</text>
<text x="600" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="white">
<tspan x="600" dy="0">Arithmetic and</tspan>
<tspan x="600" dy="24">logical operations</tspan>
</text>
<rect x="765" y="230" width="250" height="210" rx="18" fill="#4C956C" filter="url(#shadow)"/>
<text x="890" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">REGISTERS</text>
<text x="890" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="white">
<tspan x="890" dy="0">Very fast temporary</tspan>
<tspan x="890" dy="24">storage</tspan>
</text>
<line x1="435" y1="335" x2="470" y2="335" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="725" y1="335" x2="760" y2="335" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="760" y1="390" x2="725" y2="390" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="470" y1="390" x2="435" y2="390" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<text x="600" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#12355B">CPU = Control + Calculation + Immediate Working Storage</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
