<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">University Result Processing System</title>
<desc id="desc">Educational infographic: University Result Processing System</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">University Result Processing System</text>
<rect x="55" y="220" width="230" height="220" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="170" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">INPUT</text>
<text x="170" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="170" dy="0">Student ID</tspan>
<tspan x="170" dy="23">Marks • Attendance</tspan>
</text>
<line x1="285" y1="330" x2="335" y2="330" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="345" y="220" width="230" height="220" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="460" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">PROCESS</text>
<text x="460" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="460" dy="0">Total • Percentage</tspan>
<tspan x="460" dy="23">Eligibility • Grade</tspan>
</text>
<line x1="575" y1="330" x2="625" y2="330" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="635" y="220" width="230" height="220" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="750" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">STORE</text>
<text x="750" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="750" dy="0">Student database</tspan>
<tspan x="750" dy="23">Result history</tspan>
</text>
<line x1="865" y1="330" x2="915" y2="330" stroke="#5B677A" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="925" y="220" width="230" height="220" rx="18" fill="#4C956C" filter="url(#shadow)"/>
<text x="1040" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">OUTPUT</text>
<text x="1040" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="1040" dy="0">Marksheet</tspan>
<tspan x="1040" dy="23">Portal • Report</tspan>
</text>
<text x="600" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#12355B">Correction or new marks create a new processing cycle</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>