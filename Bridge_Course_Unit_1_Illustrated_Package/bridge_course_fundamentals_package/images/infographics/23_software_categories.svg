<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Categories of Software</title>
<desc id="desc">Educational infographic: Categories of Software</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Categories of Software</text>
<rect x="70" y="145" width="330" height="430" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="235" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="white">SYSTEM SOFTWARE</text>
<text x="125" y="285" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Operating systems</text>
<text x="125" y="347" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Device drivers</text>
<text x="125" y="409" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Language translators</text>
<text x="125" y="471" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• System utilities</text>
<rect x="435" y="145" width="330" height="430" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="600" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="white">APPLICATION SOFTWARE</text>
<text x="490" y="285" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Word processors</text>
<text x="490" y="347" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Web browsers</text>
<text x="490" y="409" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Spreadsheets</text>
<text x="490" y="471" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Business applications</text>
<rect x="800" y="145" width="330" height="430" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="965" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="white">FIRMWARE</text>
<text x="855" y="285" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Stored in devices</text>
<text x="855" y="347" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Controls basic functions</text>
<text x="855" y="409" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Routers and printers</text>
<text x="855" y="471" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="white">• Embedded equipment</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>