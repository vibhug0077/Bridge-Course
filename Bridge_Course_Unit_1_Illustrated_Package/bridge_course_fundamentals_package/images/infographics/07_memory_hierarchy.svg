<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Memory and Storage Hierarchy</title>
<desc id="desc">Educational infographic: Memory and Storage Hierarchy</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Memory and Storage Hierarchy</text>
<text x="1152" y="53" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#DCE9F5">Faster and smaller at the top</text>
<rect x="515.0" y="160" width="170" height="75" rx="18" fill="#C44536"/>
<text x="600" y="191" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">REGISTERS</text>
<text x="600" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="white">Fastest • Tiny</text>
<rect x="465.0" y="247" width="270" height="75" rx="18" fill="#F28F3B"/>
<text x="600" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">CACHE</text>
<text x="600" y="305" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="white">Very fast</text>
<rect x="405.0" y="334" width="390" height="75" rx="18" fill="#F6BD60"/>
<text x="600" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1F2937">RAM</text>
<text x="600" y="392" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#1F2937">Working memory</text>
<rect x="330.0" y="421" width="540" height="75" rx="18" fill="#4C956C"/>
<text x="600" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">SSD / HDD</text>
<text x="600" y="479" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="white">Long-term storage</text>
<rect x="250.0" y="508" width="700" height="75" rx="18" fill="#247BA0"/>
<text x="600" y="539" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">CLOUD / ARCHIVE</text>
<text x="600" y="566" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="white">Largest • Slowest access</text>
<text x="1050" y="235" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#C44536">SPEED</text>
<line x1="1050" y1="470" x2="1050" y2="280" stroke="#C44536" stroke-width="4" marker-end="url(#arrow)"/>
<text x="150" y="505" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#247BA0">CAPACITY</text>
<line x1="150" y1="260" x2="150" y2="455" stroke="#247BA0" stroke-width="4" marker-end="url(#arrow)"/>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>