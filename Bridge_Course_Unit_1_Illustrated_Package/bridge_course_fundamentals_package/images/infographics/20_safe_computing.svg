<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Safe and Responsible Computer Use</title>
<desc id="desc">Educational infographic: Safe and Responsible Computer Use</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Safe and Responsible Computer Use</text>
<rect x="55" y="180" width="230" height="350" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="170" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">PHYSICAL</text>
<text x="170" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="170" dy="0">Correct posture</tspan>
<tspan x="170" dy="23">Take breaks</tspan>
<tspan x="170" dy="23">Keep liquids away</tspan>
</text>
<rect x="345" y="180" width="230" height="350" rx="18" fill="#4C956C" filter="url(#shadow)"/>
<text x="460" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">DATA</text>
<text x="460" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="460" dy="0">Strong passwords</tspan>
<tspan x="460" dy="23">Backups</tspan>
<tspan x="460" dy="23">Install updates</tspan>
</text>
<rect x="635" y="180" width="230" height="350" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="750" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">ONLINE</text>
<text x="750" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="750" dy="0">Avoid unknown links</tspan>
<tspan x="750" dy="23">Protect privacy</tspan>
<tspan x="750" dy="23">Verify information</tspan>
</text>
<rect x="925" y="180" width="230" height="350" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="1040" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">ETHICAL</text>
<text x="1040" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="1040" dy="0">Respect copyright</tspan>
<tspan x="1040" dy="23">No unauthorised access</tspan>
<tspan x="1040" dy="23">Use AI responsibly</tspan>
</text>
<text x="600.0" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5B677A">Bridge Course • Unit 1: Computer Fundamentals</text>
</svg>