<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Storage Devices at a Glance</title>
<desc id="desc">Educational infographic: Storage Devices at a Glance</desc>
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#5B677A"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.15"/></filter>
</defs>
<rect width="1200" height="675" fill="#F5F7FA"/>
<rect width="1200" height="86" fill="#12355B"/>
<text x="48" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white">Storage Devices at a Glance</text>
<rect x="80" y="145" width="300" height="175" rx="18" fill="#247BA0" filter="url(#shadow)"/>
<text x="230" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">SSD</text>
<text x="230" y="257" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="230" dy="0">Fast • Silent</tspan>
<tspan x="230" dy="23">No moving parts</tspan>
</text>
<rect x="455" y="145" width="300" height="175" rx="18" fill="#F28F3B" filter="url(#shadow)"/>
<text x="605" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">HDD</text>
<text x="605" y="257" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="605" dy="0">High capacity</tspan>
<tspan x="605" dy="23">Mechanical</tspan>
</text>
