<text x="980" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">USB DRIVE</text>
<text x="980" y="257" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="980" dy="0">Portable</tspan>
<tspan x="980" dy="23">Flash storage</tspan>
</text>
<rect x="80" y="370" width="300" height="175" rx="18" fill="#6C5B7B" filter="url(#shadow)"/>
<text x="230" y="428" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">MEMORY CARD</text>
<text x="230" y="482" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
<tspan x="230" dy="0">Small and portable</tspan>
<tspan x="230" dy="23">Cameras and phones</tspan>
</text>
<rect x="455" y="370" width="300" height="175" rx="18" fill="#C44536" filter="url(#shadow)"/>
<text x="605" y="428" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="white">OPTICAL DISC</text>
<text x="605" y="482" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="white">
